<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ ai_name }} — ENML Chat</title>
    <meta name="description" content="ENML-powered AI chat with persistent memory, knowledge graph, and document ingestion.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2332;
            --bg-input: #0d1117;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(99, 179, 237, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #63b3ed;
            --accent-glow: rgba(99, 179, 237, 0.15);
            --user-bubble: #1e3a5f;
            --ai-bubble: rgba(255, 255, 255, 0.05);
            --success: #48bb78;
            --warning: #ed8936;
            --error: #fc8181;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #805ad5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Chat Area ──────────────────────────────────── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message-group {
            max-width: 800px;
            margin: 0 auto 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            position: relative;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-user {
            background: var(--user-bubble);
            border: 1px solid rgba(99, 179, 237, 0.15);
            margin-left: 48px;
            border-bottom-right-radius: 4px;
        }

        .message-ai {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            margin-right: 48px;
            border-bottom-left-radius: 4px;
        }

        .message-status {
            background: rgba(237, 137, 54, 0.1);
            border: 1px solid rgba(237, 137, 54, 0.2);
            color: var(--warning);
            font-size: 13px;
            padding: 10px 16px;
            border-radius: 8px;
            margin: 8px auto;
            max-width: 600px;
            text-align: center;
        }

        .message-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .message-label.user-label {
            text-align: right;
            color: var(--accent);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            max-width: 800px;
            margin: 0 auto 16px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 18px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Input Area ─────────────────────────────────── */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            min-height: 50px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(135deg, var(--accent), #805ad5);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            max-width: 800px;
            margin: 8px auto 0;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── Welcome Screen ─────────────────────────────── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            opacity: 0.7;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #805ad5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }

        /* ── Code blocks in messages ────────────────────── */
        .message code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .message pre code {
            background: none;
            padding: 0;
        }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 640px) {
            .header { padding: 12px 16px; }
            .chat-container { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message-user { margin-left: 24px; }
            .message-ai { margin-right: 24px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">E</div>
            <div>
                <div class="header-title">{{ ai_name }}</div>
                <div class="header-subtitle">ENML Memory Pipeline Active</div>
            </div>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span>
            <span id="connectionStatus">Connected</span>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">🧠</div>
            <h2>{{ ai_name }} — ENML Chat</h2>
            <p>Chat with full memory persistence, fact extraction, and knowledge graph. Paste documents freely — they'll be ingested intelligently.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                class="input-field"
                id="messageInput"
                placeholder="Type a message or paste a document..."
                rows="1"
                autofocus
            ></textarea>
            <button class="send-btn" id="sendBtn" title="Send">▶</button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line · Paste multi-line content freely</div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const connectionStatus = document.getElementById('connectionStatus');

        let sessionId = 'web_' + Math.random().toString(36).substring(2, 10);
        let isStreaming = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
        });

        // Send on Enter (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(role, content, type = 'normal') {
            if (welcomeScreen) {
                welcomeScreen.remove();
            }

            const group = document.createElement('div');
            group.className = 'message-group';

            if (type === 'status') {
                const statusEl = document.createElement('div');
                statusEl.className = 'message-status';
                statusEl.textContent = content;
                group.appendChild(statusEl);
            } else {
                const label = document.createElement('div');
                label.className = `message-label ${role === 'user' ? 'user-label' : ''}`;
                label.textContent = role === 'user' ? 'You' : '{{ ai_name }}';
                group.appendChild(label);

                const msg = document.createElement('div');
                msg.className = `message message-${role === 'user' ? 'user' : 'ai'}`;
                msg.textContent = content;
                group.appendChild(msg);
            }

            chatContainer.appendChild(group);
            scrollToBottom();
            return group;
        }

        function getAIMessageElement(group) {
            return group.querySelector('.message-ai');
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';

            addMessage('user', text);
            typingIndicator.classList.add('active');
            scrollToBottom();

            // Create AI response placeholder
            const aiGroup = addMessage('ai', '');
            const aiMsgEl = getAIMessageElement(aiGroup);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let aiContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));

                                if (data.type === 'content') {
                                    aiContent += data.content;
                                    aiMsgEl.textContent = aiContent;
                                    scrollToBottom();
                                } else if (data.type === 'status') {
                                    addMessage(null, data.content, 'status');
                                } else if (data.type === 'error') {
                                    aiMsgEl.textContent = '❌ Error: ' + data.content;
                                    aiMsgEl.style.color = 'var(--error)';
                                } else if (data.type === 'done') {
                                    // Stream complete
                                }
                            } catch (parseErr) {
                                // Skip malformed lines
                            }
                        }
                    }
                }

                // If no content was received, show placeholder
                if (!aiContent && aiMsgEl.textContent === '') {
                    aiMsgEl.textContent = '(No response received)';
                    aiMsgEl.style.opacity = '0.5';
                }

            } catch (error) {
                aiMsgEl.textContent = '❌ Connection error: ' + error.message;
                aiMsgEl.style.color = 'var(--error)';
                connectionStatus.textContent = 'Disconnected';
            } finally {
                typingIndicator.classList.remove('active');
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
